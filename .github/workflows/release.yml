name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release files
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist

          for TARGET in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${TARGET%/*}"
            GOARCH="${TARGET#*/}"
            NAME="bypassdpi_${VERSION}_${GOOS}_${GOARCH}"
            OUTDIR="dist/${NAME}"

            mkdir -p "$OUTDIR"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -ldflags="-s -w" -o "$OUTDIR/bypassdpi" ./cmd/bypassdpi
            tar -C "$OUTDIR" -czf "dist/${NAME}.tar.gz" bypassdpi
            rm -rf "$OUTDIR"
          done

      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:latest

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.tar.gz
